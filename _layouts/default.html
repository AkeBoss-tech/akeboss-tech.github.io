---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}

    <!-- Google Fonts: Syne (headings) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

    <style>
      /* ════════════════════════════════════════════════
         TYPOGRAPHY
         ════════════════════════════════════════════════ */
      body, p, li, span, td, input, textarea, select, .author__bio {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
      }
      h1, h2, h3, h4, h5, h6,
      .site-title, .page__title, .archive__item-title,
      .author__name, .nav__title {
        font-family: 'Syne', sans-serif !important;
        letter-spacing: -0.02em;
      }

      /* ════════════════════════════════════════════════
         STARS CONTAINER (shared)
         ════════════════════════════════════════════════ */
      .stars-container {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
        overflow: hidden;
        transition: background 0.6s ease;
      }

      /* ════════════════════════════════════════════════
         DARK MODE (default)
         ════════════════════════════════════════════════ */
      @media (prefers-color-scheme: dark), (prefers-color-scheme: no-preference) {
        .stars-container {
          background: linear-gradient(to bottom, #0d1117 0%, #161b22 100%);
        }
        .star {
          position: absolute;
          background: white;
          border-radius: 50%;
          animation: twinkle var(--twinkle-duration) infinite ease-in-out;
        }
        .shooting-star {
          position: absolute;
          width: 4px; height: 4px;
          background: white;
          border-radius: 50%;
          animation: shoot 8s infinite ease-out;
          opacity: 0;
        }
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      @keyframes shoot {
        0%   { transform: translate(0,0) rotate(-45deg); opacity: 1; }
        100% { transform: translate(300px,300px) rotate(-45deg); opacity: 0; }
      }
      @keyframes cloudDrift {
        0%   { transform: translateX(0); }
        100% { transform: translateX(120vw); }
      }
      @keyframes sparkleCloud {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50%       { opacity: 1;   transform: scale(1.3); }
      }

      /* ════════════════════════════════════════════════
         LIGHT MODE — sky + clouds
         ════════════════════════════════════════════════ */
      @media (prefers-color-scheme: light) {
        .stars-container {
          background: linear-gradient(
            180deg,
            #4fa3d1 0%,
            #74bce0 22%,
            #a8d8ee 50%,
            #c9e8f5 72%,
            #e2f3fb 100%
          );
        }

        /* ── Global color overrides for light sky ─────── */
        html, body {
          color: #12223a !important;
        }
        a {
          color: #1565c0 !important;
          text-decoration: none;
        }
        a:visited { color: #6a1aaa !important; }
        a:hover   { color: #0d47a1 !important; }

        /* Masthead */
        .masthead {
          background: rgba(12, 40, 80, 0.82) !important;
          backdrop-filter: blur(14px) !important;
          -webkit-backdrop-filter: blur(14px) !important;
          border-bottom: 1px solid rgba(255,255,255,0.12) !important;
          box-shadow: 0 2px 16px rgba(0,0,0,0.18) !important;
        }
        .masthead a, .greedy-nav a, .site-title {
          color: #ffffff !important;
        }
        .greedy-nav { background: transparent !important; }
        .greedy-nav__toggle-close,
        .greedy-nav__toggle svg { color: #12223a !important; }

        /* Sidebar */
        .sidebar,
        .author__name,
        .author__bio,
        .author__urls a,
        .author__urls-wrapper { color: #12223a !important; }
        .author__urls a:hover { color: #1565c0 !important; }

        /* Main content — broad override for all page text */
        #main, .page__content { background: transparent !important; }
        p, li, td, th, span, label, dt, dd,
        .page__content *, .archive__item *,
        section *, article * { color: #1e2d3d !important; }
        h1, h2, h3, h4, h5, h6 { color: #0d1b2a !important; }

        /* Footer */
        .page__footer {
          background: rgba(255,255,255,0.35) !important;
          color: #333 !important;
          border-top: 1px solid rgba(0,0,0,0.08) !important;
        }
        .page__footer a { color: #1565c0 !important; }

        /* Portfolio cards */
        .pf-featured-card, .pf-grid-card {
          background: rgba(255,255,255,0.72) !important;
          backdrop-filter: blur(8px) !important;
          -webkit-backdrop-filter: blur(8px) !important;
          border-color: rgba(0,0,0,0.09) !important;
        }
        .pf-featured-title, .pf-grid-title { color: #0d1b2a !important; }
        .pf-excerpt { color: #2e4057 !important; }
        .pf-link, .pf-link:hover { color: #0d1b2a !important; }
        .pf-cta { color: #1565c0 !important; }
        .pf-section-label { color: #4a6072 !important; border-color: #b0c8d8 !important; }

        /* Tag pills — lighten for sky backdrop */
        .pf-tag--ai        { background: #ddd6fe; color: #5b21b6; }
        .pf-tag--web       { background: #bbf7d0; color: #065f46; }
        .pf-tag--research  { background: #fde68a; color: #78350f; }
        .pf-tag--data      { background: #a5f3fc; color: #0e7490; }
        .pf-tag--robotics  { background: #fecaca; color: #991b1b; }
        .pf-tag--algorithms{ background: #e2e8f0; color: #334155; }

        /* About page overrides */
        .color-transition { color: #0d1b2a !important; text-shadow: none !important; }
        .row { color: #12223a !important; }
        .rotating-light-border::before { display: none; }

        /* Ensure button text stays white on coloured buttons */
        .btn { color: #fff !important; }
      }

      /* ════════════════════════════════════════════════
         SHARED LAYOUT
         ════════════════════════════════════════════════ */
      #main { background: transparent !important; }
      body  { padding-bottom: 0 !important; }
      .page__footer { margin-top: 2em; }
    </style>
  </head>

  <body>
    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <div class="stars-container" id="starsContainer"></div>

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}
  </body>
</html>

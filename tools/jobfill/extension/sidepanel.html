<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { font: 13px/1.4 -apple-system, system-ui, sans-serif; margin: 0; padding: 12px; color: #111; }
  h1 { font-size: 15px; margin: 0 0 4px; }
  #page { font-size: 11px; color: #2563eb; background: #eff6ff; border-radius: 5px; padding: 4px 8px; margin-bottom: 8px; word-break: break-all; }
  button { font: inherit; padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; }
  button.primary { background: #111; color: #fff; border-color: #111; }
  .row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .counts { display: flex; gap: 8px; margin: 8px 0; font-size: 12px; }
  .pill { padding: 2px 8px; border-radius: 999px; color: #fff; }
  .auto { background: #16a34a; } .verify { background: #d97706; } .drafted { background: #2563eb; }
  .you { background: #dc2626; } .blocker { background: #6b7280; }
  .item { border: 1px solid #eee; border-radius: 6px; padding: 8px; margin-bottom: 6px; }
  .item .tag { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; }
  .item .label { font-weight: 600; margin: 2px 0; }
  .item .val { color: #555; font-size: 12px; word-break: break-word; }
  .item .acts { margin-top: 6px; display: flex; gap: 6px; }
  textarea { width: 100%; box-sizing: border-box; height: 70px; }
  #gate { margin-top: 10px; padding: 8px; border: 1px dashed #d97706; border-radius: 6px; font-size: 12px; }
  small { color: #777; }
  #log { background: #0b1021; color: #c8d3f5; font: 11px/1.45 ui-monospace, Menlo, monospace; padding: 8px; border-radius: 6px; max-height: 280px; overflow: auto; white-space: pre-wrap; word-break: break-word; margin-top: 8px; }
</style>
</head>
<body>
  <h1>JobFill — review &amp; fill</h1>
  <div id="page" title="Each page keeps its own context">— no page —</div>
  <div class="row">
    <input type="file" id="profileFile" accept="application/json" />
    <button id="fill" class="primary">Detect &amp; fill</button>
    <button id="genall" title="Deterministic fill, then Claude Haiku finishes the rest (essays, dropdowns)">✨ Generate all (Haiku)</button>
  </div>
  <div class="row">
    <select id="resumeVariant" title="Which tailored resume to attach">
      <option value="default">resume (default)</option>
      <option value="ai-ml">AI/ML engineer</option>
      <option value="ai-infra">AI infra/platform</option>
      <option value="founding">founding engineer</option>
      <option value="quant">quant dev</option>
      <option value="comp-bio">comp bio</option>
      <option value="research">research engineer</option>
      <option value="finance">finance AI</option>
      <option value="consulting">consulting AI</option>
      <option value="enterprise">enterprise AI</option>
    </select>
    <button id="attachResume" title="Attach the chosen resume PDF to the page's file input">📎 Attach resume</button>
  </div>
  <small id="status">Import your profile.json, then open an application page and click “Detect &amp; fill”.</small>
  <div class="counts" id="counts"></div>
  <div id="list"></div>
  <div id="gate" hidden></div>
  <div class="row" style="margin-top:8px">
    <button id="toggleLog">Show debug log</button>
    <button id="copyLog">Copy log</button>
    <button id="clearLog">Clear</button>
  </div>
  <pre id="log" hidden></pre>
  <script src="src/sidepanel.js"></script>
</body>
</html>

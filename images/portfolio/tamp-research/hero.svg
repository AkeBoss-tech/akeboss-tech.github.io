<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Trace-supervised dual-arm TAMP</title>
  <desc id="desc">A robotics planning diagram showing symbolic planning, dual-arm scheduling, motion verification, trace logging, learning, and guided replanning.</desc>
  <rect width="1200" height="675" fill="#101820"/>
  <text x="70" y="88" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Trace-Supervised Dual-Arm TAMP</text>
  <text x="70" y="128" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="21">learning guides planning; TAMP and motion checks remain the verifier</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <g stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)" fill="none">
    <path d="M250 250 H390"/>
    <path d="M610 250 H750"/>
    <path d="M885 320 C850 425 720 470 590 470"/>
    <path d="M435 470 C310 455 235 380 210 315"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(70 190)">
      <rect width="210" height="120" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="3"/>
      <text x="26" y="50" fill="#eff6ff" font-size="25" font-weight="700">symbolic plan</text>
      <text x="26" y="82" fill="#bfdbfe" font-size="16">PDDLStream skeletons</text>
    </g>
    <g transform="translate(390 190)">
      <rect width="250" height="120" rx="18" fill="#3b0764" stroke="#c084fc" stroke-width="3"/>
      <text x="26" y="50" fill="#faf5ff" font-size="25" font-weight="700">dual-arm schedule</text>
      <text x="26" y="82" fill="#e9d5ff" font-size="16">CP-SAT overlap guidance</text>
    </g>
    <g transform="translate(750 190)">
      <rect width="270" height="120" rx="18" fill="#064e3b" stroke="#34d399" stroke-width="3"/>
      <text x="26" y="50" fill="#ecfdf5" font-size="25" font-weight="700">motion verifier</text>
      <text x="26" y="82" fill="#bbf7d0" font-size="16">IK, collision, cuRobo</text>
    </g>
    <g transform="translate(710 420)">
      <rect width="260" height="120" rx="18" fill="#422006" stroke="#fbbf24" stroke-width="3"/>
      <text x="26" y="50" fill="#fffbeb" font-size="25" font-weight="700">trace logger</text>
      <text x="26" y="82" fill="#fde68a" font-size="16">JSONL, Parquet, MLflow</text>
    </g>
    <g transform="translate(370 420)">
      <rect width="260" height="120" rx="18" fill="#4c0519" stroke="#fb7185" stroke-width="3"/>
      <text x="26" y="50" fill="#fff1f2" font-size="25" font-weight="700">learned guidance</text>
      <text x="26" y="82" fill="#fecdd3" font-size="16">feasibility, duration, repair</text>
    </g>
    <circle cx="185" cy="455" r="62" fill="#1f2937" stroke="#e5e7eb" stroke-width="3"/>
    <text x="138" y="449" fill="#f8fafc" font-size="18" font-weight="700">Isaac Sim</text>
    <text x="152" y="475" fill="#cbd5e1" font-size="16">ROS 2</text>
  </g>
</svg>
